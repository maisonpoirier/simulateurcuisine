
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Simulateur Cuisine Cartoon V6</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
overflow:hidden;
color:white;
}

.scene{
display:none;
height:100vh;
padding:20px;
box-sizing:border-box;
background-size:cover;
background-position:center;
}

.active{display:block}

.ui{
position:fixed;
top:10px;
left:10px;
z-index:50;
}

button{margin:3px;padding:6px}

.object{
position:absolute;
cursor:pointer;
transition:transform 0.2s;
}

.object:hover{transform:scale(1.1)}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
flex-direction:column;
z-index:100;
}
</style>
</head>

<body>

<div class="ui">
<button onclick="go('bureau')">Bureau</button>
<button onclick="go('salle')">Salle</button>
<button onclick="go('cuisine')">Cuisine</button>
</div>

<!-- ================= BUREAU ================= -->
<div id="bureau" class="scene active"
style="background-image:url('https://i.imgur.com/4QfKuz1.jpg');">

<!-- ORDINATEUR -->
<img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png"
class="object" style="width:90px;left:300px;top:300px">

<!-- THERMOMÈTRE -->
<img src="https://cdn-icons-png.flaticon.com/512/1684/1684375.png"
class="object" onclick="zoomThermo()" style="width:70px;left:100px;top:200px">

<!-- BASILIC -->
<img src="https://cdn-icons-png.flaticon.com/512/2909/2909765.png"
class="object" style="width:80px;left:500px;top:350px">

<h2>Bureau</h2>
</div>

<!-- ================= SALLE ================= -->
<div id="salle" class="scene"
style="background-image:url('https://i.imgur.com/8Qf3Z3S.jpg');">

<!-- CLIM -->
<img src="https://cdn-icons-png.flaticon.com/512/1684/1684375.png"
style="width:80px;position:absolute;left:200px;top:200px">

<!-- VENTILATEUR -->
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png"
style="width:100px;position:absolute;left:400px;top:250px">

<h2>Salle restaurant</h2>
</div>

<!-- ================= CUISINE ================= -->
<div id="cuisine" class="scene"
style="background-image:url('https://i.imgur.com/3ZQ3Z8l.jpg');">

<!-- FRIGO -->
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png"
style="width:120px;position:absolute;left:150px;top:250px">

<!-- FOUR -->
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png"
style="width:120px;position:absolute;left:350px;top:250px">

<!-- TABLETTE -->
<img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png"
style="width:90px;position:absolute;left:550px;top:200px">

<h2>Cuisine professionnelle</h2>
</div>

<!-- ================= ZOOM THERMO ================= -->
<div class="modal" id="zoom">
<h3>Thermomètre alcool</h3>
<img src="https://cdn-icons-png.flaticon.com/512/1684/1684375.png"
style="width:200px">
<button onclick="closeM()">Fermer</button>
</div>

<script>

function go(id){
document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function zoomThermo(){
document.getElementById("zoom").style.display="flex";
}

function closeM(){
document.getElementById("zoom").style.display="none";
}

</script>

</body>
</html>
