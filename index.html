<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Simulation HACCP immersive</title>

<style>
body {margin:0; overflow:hidden; font-family:Arial;}

#viewer {
width:100%;
height:600px;
background-size:cover;
background-repeat:repeat-x;
background-position:0px center;
cursor:grab;
position:relative;
}

.nav {
position:absolute;
padding:10px;
background:white;
border-radius:10px;
cursor:pointer;
}

#thermo {
position:absolute;
top:20px;
right:20px;
background:white;
padding:10px;
border-radius:50%;
}

#bulle {
position:absolute;
bottom:10px;
left:10px;
right:10px;
background:#000c;
color:white;
padding:15px;
border-radius:15px;
max-height:160px;
overflow:auto;
font-size:14px;
}

</style>

</head>

<body>

<div id="viewer"></div>
<div id="thermo">20°C</div>
<div id="bulle"></div>

<script>

// 👉 TON TEXTE EXACT (NON MODIFIÉ)
const scriptText = `Bonjour l'apprenti, tu es nouveau, pour te familiariser avec la cuisine tu vas être en charge des température.
Tu devras aller dans le bureau et monter le chauffage à 21°C car Paul le responsable dit qu'il y fait trop froid, j'ai un thermomètre au mur à côté de la fenêtre tu pourras vérifier si Paul a raison.
Prends le thermomètre manuel sur mon bureau et viens faire les relevés de températures des chambres froides, n'oublie pas de compléter la fiche de suivi sur la tablette.
En passant tu mettras le four à préchauffer sur thermostat 6.
Ensuite tu iras en salle il y a déjà du monde et il commence à faire chaud tu allumeras la clim à 26°C et puis tu mettras le ventilo sur grande vitesse.
Bon eh bien tu as du travail, ne traîne pas la journée s'annonce chargée, et puis bien venu chez nous !!!`;

// affichage texte complet
document.getElementById("bulle").innerText = scriptText;

// SCENES
const scenes = {
cuisine: "https://images.unsplash.com/photo-1556911220-bff31c812dba?q=80&w=2000",
bureau: "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000",
bar: "https://images.unsplash.com/photo-1578474846511-04ba529f0b88?q=80&w=2000"
};

let current = "cuisine";
let pos = 0;

const viewer = document.getElementById("viewer");

function loadScene(scene){

current = scene;
viewer.style.backgroundImage = `url(${scenes[scene]})`;
viewer.innerHTML = "";

// NAVIGATION
if(scene==="cuisine"){
addNav("➡ Bureau", "10%", "70%", ()=>loadScene("bureau"));
addNav("➡ Salle", "80%", "70%", ()=>loadScene("bar"));
addKitchen();
}

if(scene==="bureau"){
addNav("➡ Cuisine", "50%", "70%", ()=>loadScene("cuisine"));
addBureau();
}

if(scene==="bar"){
addNav("➡ Cuisine", "50%", "70%", ()=>loadScene("cuisine"));
addBar();
}

}

// NAV
function addNav(text,x,y,action){
let el = document.createElement("div");
el.className="nav";
el.style.left=x;
el.style.top=y;
el.innerHTML=text;
el.onclick=action;
viewer.appendChild(el);
}

// CUISINE
function addKitchen(){

let four = document.createElement("div");
four.className="nav";
four.style.left="500px";
four.style.top="300px";
four.innerHTML="🔥 Four OFF";
four.onclick=()=>{
four.innerHTML = four.innerHTML.includes("OFF") ? "🔥 Four ON (thermostat 6)" : "🔥 Four OFF";
};
viewer.appendChild(four);

}

// BUREAU
function addBureau(){

let chauffage = document.createElement("div");
chauffage.className="nav";
chauffage.style.left="300px";
chauffage.style.top="300px";
chauffage.innerHTML="🔥 Chauffage 20°C";
chauffage.onclick=()=>{
chauffage.innerHTML="🔥 Chauffage 21°C";
document.getElementById("thermo").innerHTML="21°C";
};
viewer.appendChild(chauffage);

}

// SALLE / BAR
function addBar(){

let clim = document.createElement("div");
clim.className="nav";
clim.style.left="300px";
clim.style.top="300px";
clim.innerHTML="❄️ Clim OFF";
clim.onclick=()=>{
clim.innerHTML="❄️ Clim 26°C";
};
viewer.appendChild(clim);

let ventilo = document.createElement("div");
ventilo.className="nav";
ventilo.style.left="500px";
ventilo.style.top="350px";
ventilo.innerHTML="🌀 Ventilo OFF";
ventilo.onclick=()=>{
ventilo.innerHTML="🌀 Ventilo MAX";
};
viewer.appendChild(ventilo);

}

// DEPLACEMENT
let isDown=false, startX=0;

viewer.addEventListener("mousedown", e=>{
isDown=true;
startX=e.clientX;
});

viewer.addEventListener("mouseup", ()=>isDown=false);

viewer.addEventListener("mousemove", e=>{
if(!isDown) return;

pos += (e.clientX - startX);
pos = Math.max(-1000, Math.min(1000, pos));

viewer.style.backgroundPosition = pos+"px center";
startX=e.clientX;
});

loadScene("cuisine");

</script>

</body>
</html>
